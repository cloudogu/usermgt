apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "usermgt.fullname" . }}-config
  labels:
    {{- include "usermgt.labels" . | nindent 4 }}
    {{- include "usermgt.backupLabels" . | nindent 4 }}
data:
  config.yaml: |
    {{- .Values.config | toYaml | nindent 4 }}
  sensitive-config.yaml: |
    {}
