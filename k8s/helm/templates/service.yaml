apiVersion: v1
kind: Service
metadata:
  name: {{ include "usermgt.name" . }}
  labels:
    {{- include "usermgt.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "usermgt.selectorLabels" . | nindent 4 }}
  type: ClusterIP
  ports:
    - name: http-web-svc
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http-web-svc
