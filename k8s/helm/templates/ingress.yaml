{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "usermgt.name" . }}
  labels:
    {{- include "usermgt.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.class }}
  rules:
    - http:
        paths:
          - backend:
              service:
                name: {{ include "usermgt.name" . }}
                port:
                  number: {{ .Values.service.port }}
            path: /{{ include "usermgt.name" . }}
            pathType: Prefix
{{- end }}
